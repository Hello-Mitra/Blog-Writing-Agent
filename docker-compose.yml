services:

  backend:
    image: ${ECR_REGISTRY}/${ECR_BACKEND_REPO}:latest
    container_name: bwa_backend
    ports:
      - "8000:8000"
    env_file:
      - /home/ubuntu/.env
    volumes:
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: ${ECR_REGISTRY}/${ECR_FRONTEND_REPO}:latest
    container_name: bwa_frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./artifacts:/app/artifacts    # ✅ add this line
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped